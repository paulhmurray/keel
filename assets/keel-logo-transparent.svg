<svg width="400" height="160" viewBox="0 0 400 160" xmlns="http://www.w3.org/2000/svg">

  <g transform="translate(68, 80)">

    <!-- Outer dashed ring -->
    <circle cx="0" cy="0" r="52" fill="none" stroke="#253040" stroke-width="0.8" stroke-dasharray="3 5"/>
    <!-- Inner ring -->
    <circle cx="0" cy="0" r="34" fill="none" stroke="#1e2830" stroke-width="0.8"/>

    <!-- Cross hairs -->
    <line x1="0" y1="-56" x2="0" y2="56" fill="none" stroke="#1e2830" stroke-width="0.5"/>
    <line x1="-56" y1="0" x2="56" y2="0" fill="none" stroke="#1e2830" stroke-width="0.5"/>

    <!-- Diagonal guides -->
    <line x1="-39" y1="-39" x2="39" y2="39" fill="none" stroke="#1e2830" stroke-width="0.3" stroke-dasharray="2 6"/>
    <line x1="39" y1="-39" x2="-39" y2="39" fill="none" stroke="#1e2830" stroke-width="0.3" stroke-dasharray="2 6"/>

    <!-- Inner ring ticks -->
    <circle cx="0" cy="-34" r="2" fill="#253040"/>
    <circle cx="0" cy="34" r="2" fill="#253040"/>
    <circle cx="-34" cy="0" r="2" fill="#253040"/>
    <circle cx="34" cy="0" r="2" fill="#253040"/>

    <!-- Outer ring ticks -->
    <circle cx="0" cy="-52" r="2" fill="#253040"/>
    <circle cx="0" cy="52" r="2" fill="#253040"/>
    <circle cx="-52" cy="0" r="2" fill="#253040"/>
    <circle cx="52" cy="0" r="2" fill="#253040"/>

    <!-- North needle (amber) -->
    <path d="M 0 -30 L 6 -5 L 0 0 L -6 -5 Z" fill="#e8a430" opacity="0.95"/>
    <!-- South needle (dim) -->
    <path d="M 0 0 L 6 5 L 0 30 L -6 5 Z" fill="#253040"/>

    <!-- Needle spine -->
    <line x1="0" y1="-30" x2="0" y2="30" stroke="#e8a430" stroke-width="1.2"/>

    <!-- North cap -->
    <path d="M -5 -48 L 0 -56 L 5 -48" fill="none" stroke="#e8a430" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Pivot -->
    <circle cx="0" cy="0" r="5" fill="none" stroke="#e8a430" stroke-width="1.2"/>
    <circle cx="0" cy="0" r="2" fill="#e8a430"/>

    <!-- Phosphor bearing dot + line -->
    <circle cx="30" cy="-17" r="2.5" fill="#2dd4a0" opacity="0.75"/>
    <path d="M 0 0 L 30 -17" fill="none" stroke="#2dd4a0" stroke-width="0.7" stroke-dasharray="2 3" opacity="0.5"/>

    <!-- Cardinal labels -->
    <text x="0" y="-62" text-anchor="middle" fill="#3d4f5f" font-family="'Courier New', monospace" font-size="8" letter-spacing="1">N</text>
    <text x="0" y="72" text-anchor="middle" fill="#3d4f5f" font-family="'Courier New', monospace" font-size="8" letter-spacing="1">S</text>
    <text x="64" y="4" text-anchor="middle" fill="#3d4f5f" font-family="'Courier New', monospace" font-size="8" letter-spacing="1">E</text>
    <text x="-64" y="4" text-anchor="middle" fill="#3d4f5f" font-family="'Courier New', monospace" font-size="8" letter-spacing="1">W</text>

  </g>

  <!-- Wordmark -->
  <text x="152" y="70" fill="#e8a430" font-family="'Courier New', monospace" font-size="42" font-weight="700" letter-spacing="10">KEEL</text>

  <!-- Tagline -->
  <text x="153" y="95" fill="#3d4f5f" font-family="'Courier New', monospace" font-size="9" letter-spacing="5">TPM COMMAND CENTRE</text>

  <!-- Rule -->
  <line x1="152" y1="108" x2="385" y2="108" stroke="#1e2830" stroke-width="0.5"/>
  <text x="153" y="120" fill="#253040" font-family="'Courier New', monospace" font-size="7" letter-spacing="3">STAY THE COURSE</text>

</svg>
