<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="400" fill="#0a0d0f" rx="8"/>

  <g transform="translate(200, 185)">

    <!-- Outer dashed ring -->
    <circle cx="0" cy="0" r="90" fill="none" stroke="#253040" stroke-width="0.5" stroke-dasharray="4 6"/>
    <!-- Inner ring -->
    <circle cx="0" cy="0" r="60" fill="none" stroke="#253040" stroke-width="0.5"/>

    <!-- Cross hairs -->
    <line x1="0" y1="-95" x2="0" y2="95" fill="none" stroke="#253040" stroke-width="0.5"/>
    <line x1="-95" y1="0" x2="95" y2="0" fill="none" stroke="#253040" stroke-width="0.5"/>

    <!-- Diagonal guides -->
    <line x1="-67" y1="-67" x2="67" y2="67" fill="none" stroke="#253040" stroke-width="0.3" stroke-dasharray="2 8"/>
    <line x1="67" y1="-67" x2="-67" y2="67" fill="none" stroke="#253040" stroke-width="0.3" stroke-dasharray="2 8"/>

    <!-- Inner ring tick marks -->
    <circle cx="0" cy="-60" r="3" fill="#253040"/>
    <circle cx="0" cy="60" r="3" fill="#253040"/>
    <circle cx="-60" cy="0" r="3" fill="#253040"/>
    <circle cx="60" cy="0" r="3" fill="#253040"/>

    <!-- Outer ring tick marks -->
    <circle cx="0" cy="-90" r="2.5" fill="#253040"/>
    <circle cx="0" cy="90" r="2.5" fill="#253040"/>
    <circle cx="-90" cy="0" r="2.5" fill="#253040"/>
    <circle cx="90" cy="0" r="2.5" fill="#253040"/>

    <!-- Needle - north (amber, pointing up) -->
    <path d="M 0 -52 L 10 -8 L 0 0 L -10 -8 Z" fill="#e8a430" opacity="0.95"/>
    <!-- Needle - south (dark) -->
    <path d="M 0 0 L 10 8 L 0 52 L -10 8 Z" fill="#253040"/>

    <!-- Needle spine -->
    <line x1="0" y1="-52" x2="0" y2="52" stroke="#e8a430" stroke-width="1.5"/>

    <!-- Centre pivot -->
    <circle cx="0" cy="0" r="6" fill="#0a0d0f" stroke="#e8a430" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="2.5" fill="#e8a430"/>

    <!-- North arrow indicator -->
    <path d="M -8 -85 L 0 -95 L 8 -85" fill="none" stroke="#e8a430" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Phosphor accent dots (programme items / data points) -->
    <circle cx="52" cy="-30" r="3" fill="#2dd4a0" opacity="0.7"/>
    <circle cx="-38" cy="45" r="2" fill="#2dd4a0" opacity="0.4"/>
    <circle cx="70" cy="25" r="1.5" fill="#e8a430" opacity="0.5"/>

    <!-- Bearing line to phosphor dot -->
    <path d="M 0 0 L 52 -30" fill="none" stroke="#2dd4a0" stroke-width="0.8" stroke-dasharray="2 4" opacity="0.5"/>

  </g>

  <!-- Cardinal points -->
  <text x="196" y="78" text-anchor="middle" fill="#5a7080" font-family="'Courier New', monospace" font-size="10" letter-spacing="1">N</text>
  <text x="196" y="303" text-anchor="middle" fill="#5a7080" font-family="'Courier New', monospace" font-size="10" letter-spacing="1">S</text>
  <text x="305" y="190" text-anchor="middle" fill="#5a7080" font-family="'Courier New', monospace" font-size="10" letter-spacing="1">E</text>
  <text x="88" y="190" text-anchor="middle" fill="#5a7080" font-family="'Courier New', monospace" font-size="10" letter-spacing="1">W</text>

  <!-- Wordmark -->
  <text x="200" y="328" text-anchor="middle" fill="#e8a430" font-family="'Courier New', monospace" font-size="30" font-weight="700" letter-spacing="12">KEEL</text>

  <!-- Tagline -->
  <text x="200" y="350" text-anchor="middle" fill="#2a3840" font-family="'Courier New', monospace" font-size="8" letter-spacing="5">TPM COMMAND CENTRE</text>

  <!-- Bottom rule -->
  <line x1="40" y1="368" x2="360" y2="368" stroke="#1e2830" stroke-width="0.5"/>
  <text x="200" y="382" text-anchor="middle" fill="#2a3840" font-family="'Courier New', monospace" font-size="7" letter-spacing="3">STAY THE COURSE</text>

</svg>
