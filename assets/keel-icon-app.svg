<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">

  <!-- Subtle dark container - not solid black, just enough to ground it -->
  <rect width="128" height="128" fill="#0f1418" rx="22" opacity="0.85"/>

  <!-- Very subtle inner border -->
  <rect x="1" y="1" width="126" height="126" fill="none" stroke="#1e2830" stroke-width="1" rx="21" opacity="0.6"/>

  <g transform="translate(64, 64)">

    <!-- Outer dashed ring -->
    <circle cx="0" cy="0" r="44" fill="none" stroke="#253040" stroke-width="0.8" stroke-dasharray="3 5"/>
    <!-- Inner ring -->
    <circle cx="0" cy="0" r="29" fill="none" stroke="#1e2830" stroke-width="0.8"/>

    <!-- Cross hairs -->
    <line x1="0" y1="-48" x2="0" y2="48" fill="none" stroke="#1e2830" stroke-width="0.5"/>
    <line x1="-48" y1="0" x2="48" y2="0" fill="none" stroke="#1e2830" stroke-width="0.5"/>

    <!-- Diagonal guides -->
    <line x1="-32" y1="-32" x2="32" y2="32" fill="none" stroke="#1e2830" stroke-width="0.3" stroke-dasharray="2 7"/>
    <line x1="32" y1="-32" x2="-32" y2="32" fill="none" stroke="#1e2830" stroke-width="0.3" stroke-dasharray="2 7"/>

    <!-- Inner ring ticks -->
    <circle cx="0" cy="-29" r="1.8" fill="#253040"/>
    <circle cx="0" cy="29" r="1.8" fill="#253040"/>
    <circle cx="-29" cy="0" r="1.8" fill="#253040"/>
    <circle cx="29" cy="0" r="1.8" fill="#253040"/>

    <!-- Outer ring ticks -->
    <circle cx="0" cy="-44" r="1.5" fill="#1e2830"/>
    <circle cx="0" cy="44" r="1.5" fill="#1e2830"/>
    <circle cx="-44" cy="0" r="1.5" fill="#1e2830"/>
    <circle cx="44" cy="0" r="1.5" fill="#1e2830"/>

    <!-- North needle (amber) -->
    <path d="M 0 -25 L 5.5 -4 L 0 0 L -5.5 -4 Z" fill="#e8a430" opacity="0.95"/>
    <!-- South needle (dim) -->
    <path d="M 0 0 L 5.5 4 L 0 25 L -5.5 4 Z" fill="#253040"/>

    <!-- Needle spine -->
    <line x1="0" y1="-25" x2="0" y2="25" stroke="#e8a430" stroke-width="1.2"/>

    <!-- North cap -->
    <path d="M -5 -40 L 0 -48 L 5 -40" fill="none" stroke="#e8a430" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Pivot -->
    <circle cx="0" cy="0" r="4.5" fill="#0f1418" stroke="#e8a430" stroke-width="1.2"/>
    <circle cx="0" cy="0" r="1.8" fill="#e8a430"/>

    <!-- Phosphor bearing dot + line -->
    <circle cx="25" cy="-15" r="2.5" fill="#2dd4a0" opacity="0.8"/>
    <path d="M 0 0 L 25 -15" fill="none" stroke="#2dd4a0" stroke-width="0.8" stroke-dasharray="2 3" opacity="0.5"/>

  </g>

</svg>
