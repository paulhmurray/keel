<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <rect width="128" height="128" fill="#0a0d0f" rx="24"/>

  <g transform="translate(64, 64)">

    <circle cx="0" cy="0" r="46" fill="none" stroke="#253040" stroke-width="0.8" stroke-dasharray="3 5"/>
    <circle cx="0" cy="0" r="30" fill="none" stroke="#1e2830" stroke-width="0.8"/>

    <line x1="0" y1="-50" x2="0" y2="50" fill="none" stroke="#1e2830" stroke-width="0.5"/>
    <line x1="-50" y1="0" x2="50" y2="0" fill="none" stroke="#1e2830" stroke-width="0.5"/>

    <circle cx="0" cy="-30" r="2" fill="#1e2830"/>
    <circle cx="0" cy="30" r="2" fill="#1e2830"/>
    <circle cx="-30" cy="0" r="2" fill="#1e2830"/>
    <circle cx="30" cy="0" r="2" fill="#1e2830"/>

    <!-- North needle (amber) -->
    <path d="M 0 -26 L 6 -4 L 0 0 L -6 -4 Z" fill="#e8a430"/>
    <!-- South needle (dark) -->
    <path d="M 0 0 L 6 4 L 0 26 L -6 4 Z" fill="#253040"/>

    <line x1="0" y1="-26" x2="0" y2="26" stroke="#e8a430" stroke-width="1"/>

    <!-- North cap -->
    <path d="M -5 -43 L 0 -50 L 5 -43" fill="none" stroke="#e8a430" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Pivot -->
    <circle cx="0" cy="0" r="4" fill="#0a0d0f" stroke="#e8a430" stroke-width="1.2"/>
    <circle cx="0" cy="0" r="1.5" fill="#e8a430"/>

    <!-- Phosphor bearing dot -->
    <circle cx="26" cy="-15" r="2.5" fill="#2dd4a0" opacity="0.75"/>
    <path d="M 0 0 L 26 -15" fill="none" stroke="#2dd4a0" stroke-width="0.7" stroke-dasharray="2 3" opacity="0.5"/>

  </g>
</svg>
