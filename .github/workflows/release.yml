name: Release (Linux + Windows)
# macOS is built and signed via Codemagic (see codemagic.yaml).
# Codemagic attaches keel-macos.dmg and keel-macos.zip to the GitHub release.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            artifact_name: keel-linux.tar.gz

          - os: windows-latest
            platform: windows
            artifact_name: keel-windows-setup.exe

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Linux build dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            clang cmake ninja-build \
            libgtk-3-dev libblkid-dev \
            liblzma-dev libglib2.0-dev \
            libsecret-1-dev

      - name: Flutter pub get
        run: flutter pub get

      # ── Linux ──────────────────────────────────────────────────────────────
      - name: Build (Linux)
        if: matrix.platform == 'linux'
        run: flutter build linux --release

      - name: Package (Linux)
        if: matrix.platform == 'linux'
        run: |
          cp linux/install.sh build/linux/x64/release/bundle/install.sh
          chmod +x build/linux/x64/release/bundle/install.sh
          tar -czf keel-linux.tar.gz \
            -C build/linux/x64/release/bundle .

      # ── Windows ────────────────────────────────────────────────────────────
      - name: Build (Windows)
        if: matrix.platform == 'windows'
        run: flutter build windows --release

      - name: Install Inno Setup
        if: matrix.platform == 'windows'
        run: choco install innosetup --no-progress -y

      - name: Build installer (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" windows\installer\keel.iss
          Copy-Item windows\installer\installer_output\keel-windows-setup.exe keel-windows-setup.exe

      - name: Package zip (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          Compress-Archive `
            -Path build/windows/x64/runner/Release/* `
            -DestinationPath keel-windows.zip

      # ── Upload ─────────────────────────────────────────────────────────────
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}
          retention-days: 1

      - name: Upload zip artifact (Windows)
        if: matrix.platform == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: keel-windows.zip
          path: keel-windows.zip
          retention-days: 1

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Keel ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            keel-linux.tar.gz
            keel-windows-setup.exe
            keel-windows.zip
