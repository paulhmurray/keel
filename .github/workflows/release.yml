name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            artifact_name: keel-linux.tar.gz

          - os: macos-latest
            platform: macos
            artifact_name: keel-macos.zip

          - os: windows-latest
            platform: windows
            artifact_name: keel-windows.zip

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Linux build dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            clang cmake ninja-build \
            libgtk-3-dev libblkid-dev \
            liblzma-dev libglib2.0-dev \
            libsecret-1-dev

      - name: Flutter pub get
        run: flutter pub get

      # ── Linux ──────────────────────────────────────────────────────────────
      - name: Build (Linux)
        if: matrix.platform == 'linux'
        run: flutter build linux --release

      - name: Package (Linux)
        if: matrix.platform == 'linux'
        run: |
          tar -czf keel-linux.tar.gz \
            -C build/linux/x64/release/bundle .

      # ── macOS ──────────────────────────────────────────────────────────────
      - name: Build (macOS)
        if: matrix.platform == 'macos'
        run: flutter build macos --release

      - name: Ad-hoc sign (macOS)
        if: matrix.platform == 'macos'
        run: |
          APP=$(find build/macos/Build/Products/Release -name "*.app" -maxdepth 1 | head -1)
          codesign --deep --force --sign - "$APP"

      - name: Package (macOS)
        if: matrix.platform == 'macos'
        run: |
          APP=$(find build/macos/Build/Products/Release -name "*.app" -maxdepth 1 | head -1)
          ditto -c -k --sequesterRsrc --keepParent "$APP" keel-macos.zip

      # ── Windows ────────────────────────────────────────────────────────────
      - name: Build (Windows)
        if: matrix.platform == 'windows'
        run: flutter build windows --release

      - name: Package (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          Compress-Archive `
            -Path build/windows/x64/runner/Release/* `
            -DestinationPath keel-windows.zip

      # ── Upload ─────────────────────────────────────────────────────────────
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}
          retention-days: 1

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Keel ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            keel-linux.tar.gz
            keel-macos.zip
            keel-windows.zip
