workflows:
  macos-release:
    name: macOS Release
    max_build_duration: 60
    instance_type: mac_mini_m2

    triggering:
      events:
        - tag
      tag_patterns:
        - pattern: 'v*'
          include: true

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      groups:
        - apple_credentials   # contains APP_STORE_CONNECT_* vars (see below)

    scripts:
      - name: Flutter pub get
        script: flutter pub get

      - name: Build macOS release
        script: flutter build macos --release

      - name: Sign and notarize
        script: |
          # Write the API private key to a file.
          # printf '%b' converts literal \n escape sequences to real newlines
          # in case Codemagic stored the key that way.
          mkdir -p /tmp/certs
          printf '%b' "$APP_STORE_CONNECT_PRIVATE_KEY" > /tmp/certs/AuthKey.p8
          # Re-export so the app-store-connect CLI reads it cleanly from env
          export APP_STORE_CONNECT_PRIVATE_KEY="$(cat /tmp/certs/AuthKey.p8)"

          # Initialize keychain and create the Developer ID Application certificate
          keychain initialize
          app-store-connect certificates create \
            --type DEVELOPER_ID_APPLICATION \
            --save
          keychain add-certificates

          APP=$(find build/macos/Build/Products/Release -name "*.app" -maxdepth 1 | head -1)

          # Sign with Developer ID (no provisioning profile needed for direct distribution)
          codesign \
            --deep --force --options runtime \
            --sign "Developer ID Application" \
            "$APP"

          # Zip for notarization submission
          ditto -c -k --keepParent "$APP" keel-notarize.zip

          # Submit to Apple notary service
          xcrun notarytool submit keel-notarize.zip \
            --key /tmp/certs/AuthKey.p8 \
            --key-id "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --issuer "$APP_STORE_CONNECT_ISSUER_ID" \
            --wait

          # Staple the ticket to the .app
          xcrun stapler staple "$APP"

          rm -rf /tmp/certs

      - name: Package as DMG
        script: |
          APP=$(find build/macos/Build/Products/Release -name "*.app" -maxdepth 1 | head -1)
          mkdir -p dmg_staging
          cp -r "$APP" dmg_staging/
          ln -s /Applications dmg_staging/Applications
          hdiutil create \
            -volname "Keel" \
            -srcfolder dmg_staging \
            -ov -format UDZO \
            keel-macos.dmg

      - name: Package as ZIP
        script: |
          APP=$(find build/macos/Build/Products/Release -name "*.app" -maxdepth 1 | head -1)
          ditto -c -k --keepParent "$APP" keel-macos.zip

      - name: Upload to GitHub Release
        script: |
          REPO="paulhmurray/keel"
          TAG="$FCI_TAG"

          # Wait for GitHub Actions to create the release (up to 5 minutes)
          RELEASE_ID=""
          for i in $(seq 1 30); do
            RELEASE_ID=$(curl -sf \
              -H "Authorization: token $GITHUB_TOKEN" \
              "https://api.github.com/repos/$REPO/releases/tags/$TAG" \
              | jq -r '.id // empty')
            if [ -n "$RELEASE_ID" ]; then
              echo "Found release $RELEASE_ID for $TAG"
              break
            fi
            echo "Waiting for release to exist (attempt $i/30)..."
            sleep 10
          done

          if [ -z "$RELEASE_ID" ]; then
            echo "ERROR: GitHub release for $TAG not found after 5 minutes"
            exit 1
          fi

          for FILE in keel-macos.dmg keel-macos.zip; do
            echo "Uploading $FILE..."
            curl -f -X POST \
              -H "Authorization: token $GITHUB_TOKEN" \
              -H "Content-Type: application/octet-stream" \
              --data-binary @"$FILE" \
              "https://uploads.github.com/repos/$REPO/releases/$RELEASE_ID/assets?name=$FILE"
          done

    artifacts:
      - keel-macos.dmg
      - keel-macos.zip
